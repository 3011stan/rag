name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "refactor/**"
      - "docs/**"
      - "chore/**"
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build API
        run: go build -o rag-app .
